<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globalisierung & Einkauf 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Video Styling */
        .video-card {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        video, iframe {
            width: 100%;
            height: 500px; 
            object-fit: cover;
            border: none;
            background: #000;
        }

        .video-label {
            padding: 1rem;
            background: #fff;
            text-align: center;
            font-weight: 600;
            border-top: 1px solid #eee;
        }

        /* Fehler-Anzeige */
        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            padding: 5px;
            text-align: center;
            background: #fee2e2;
        }
    </style>
</head>
<body>

<header>
    <h1>Einkaufsverhalten & Globalisierung</h1>
    <p>Projekt-Dashboard 2026</p>
</header>

<div class="container">

    <div class="card">
        <h2>Unsere Kampagne: Global vs. Lokal</h2>
        <div class="grid">
            
            <div class="video-card">
                <video controls id="video1">
                    <source src="Pow.mp4" type="video/mp4">
                    Browser-Fehler: Video-Tag wird nicht unterstützt.
                </video>
                <div id="status1" class="error-msg" style="display:none;">Datei "Pow.mp4" wurde nicht gefunden!</div>
                <div class="video-label">Der Preis-Check</div>
            </div>

            <div class="video-card">
                <iframe 
                    src="https://www.youtube.com/embed/TZXa_jsnrak" 
                    allowfullscreen>
                </iframe>
                <div class="video-label">Geisterstadt (YouTube)</div>
            </div>

            <div class="video-card">
                <video controls id="video2">
                    <source src="Pow.mp4" type="video/mp4">
                </video>
                <div id="status2" class="error-msg" style="display:none;">Datei "Pow.mp4" wurde nicht gefunden!</div>
                <div class="video-label">Reise eines Apfels</div>
            </div>

        </div>
    </div>
</div>

<script>
    // Kleiner Test, ob die Dateien geladen werden können
    function checkVideo(videoElem, statusElem) {
        videoElem.onerror = function() {
            document.getElementById(statusElem).style.display = "block";
        };
    }
    checkVideo(document.getElementById('video1'), 'status1');
    checkVideo(document.getElementById('video2'), 'status2');
</script>

</body>
</html>
