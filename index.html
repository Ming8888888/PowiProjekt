<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globalisierung & Einkauf 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 2.5rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: start; /* Wichtig, damit Boxen nicht unterschiedlich lang gezogen werden */
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Video Styling */
        .video-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9; /* Standard für normales Video 1 */
        }

        /* Spezial-Klasse für Shorts (Video 2 & 3) */
        .video-wrapper.is-short {
            aspect-ratio: 9 / 16; 
            max-width: 320px; /* Shorts nicht zu breit machen */
            margin: 0 auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 1rem;
            text-align: center;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<header>
    <h1>Einkaufsverhalten & Globalisierung</h1>
    <p>Analyse & Videokampagne 2026</p>
</header>

<div class="container">
    <h2 style="margin-bottom: 1.5rem;">Unsere Kampagne: Global vs. Lokal</h2>

    <div class="grid">

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/Oti3WusubRw" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>Video 1 (Normal)</h3>
                <p>Analyse der Globalisierung</p>
            </div>
        </div>

        <div class="video-card">
            <div class="video-wrapper is-short">
                <iframe src="https://www.youtube.com/embed/QhRhLwbZlF8" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>Video 2 (Short)</h3>
                <p>Einkaufstrends</p>
            </div>
        </div>

        <div class="video-card">
            <div class="video-wrapper is-short">
                <iframe src="https://www.youtube.com/embed/zGAJVnTvhW4" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>Video 3 (Short)</h3>
                <p>Lokale Angebote</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
